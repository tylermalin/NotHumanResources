<!doctype html>
<html><head><meta charset="utf-8"><style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 630px;
    background: #09090b;
    font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
    color: #fafafa;
    display: flex; flex-direction: column; justify-content: center;
    padding: 0 96px;
    position: relative; overflow: hidden;
  }
  .grid {
    position: absolute; inset: 0;
    background-image: linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(255,255,255,.035) 1px, transparent 1px);
    background-size: 48px 48px;
  }
  .glow {
    position: absolute; right: -180px; top: -180px; width: 560px; height: 560px;
    background: radial-gradient(circle, rgba(16,185,129,.14), transparent 65%);
  }
  h1 { font-size: 76px; letter-spacing: -2.5px; font-weight: 700; position: relative; }
  h1 .not { color: #52525b; font-weight: 600; }
  .tag { margin-top: 18px; font-size: 30px; color: #d4d4d8; font-weight: 500; position: relative; }
  .sub { margin-top: 26px; font-size: 21px; color: #71717a; max-width: 780px; line-height: 1.5; position: relative; }
  .chips { margin-top: 40px; display: flex; gap: 12px; position: relative; }
  .chip {
    border: 1px solid #27272a; background: #18181b; border-radius: 999px;
    padding: 10px 20px; font-size: 17px; color: #a1a1aa;
  }
  .chip b { color: #34d399; font-weight: 600; }
  .footer {
    position: absolute; bottom: 40px; left: 96px; right: 96px;
    display: flex; justify-content: space-between; align-items: center;
    font-size: 17px; color: #52525b;
  }
</style></head><body>
  <div class="grid"></div><div class="glow"></div>
  <h1><span class="not">(not)</span>Human Resources</h1>
  <div class="tag">Your HR department for AI agents.</div>
  <div class="sub">Hire AI workers with a verified identity, a role scoped to exactly what you allow, and a tamper-evident work record.</div>
  <div class="chips">
    <div class="chip"><b>✓</b> Employee ID</div>
    <div class="chip"><b>✓</b> Scoped role</div>
    <div class="chip"><b>✓</b> Work record</div>
    <div class="chip"><b>✓</b> One-click offboard</div>
  </div>
  <div class="footer"><span>nothumanresources.xyz</span><span>Secured by NEUS</span></div>
</body></html>
